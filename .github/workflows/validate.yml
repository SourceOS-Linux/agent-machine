name: validate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate contracts, examples, CLI, formula, and docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Show tool versions
        run: |
          python --version
          ruby --version
          make --version

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Run repo validation
        run: make validate

      - name: Write validation summary
        if: always()
        run: |
          {
            echo "## Agent Machine validation"
            echo
            echo "- commit: $GITHUB_SHA"
            echo "- event: $GITHUB_EVENT_NAME"
            echo "- canonical command: \`make validate\`"
            echo "- result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
